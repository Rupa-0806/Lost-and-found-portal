<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Animated Contact Us</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Roboto", sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      perspective: 1200px; /* 👈 Enables 3D */
      overflow-x: hidden;
    }

    /* 🌐 Navbar */
    .navbar {
      background: linear-gradient(145deg, #5a0eb5, #1f5ad7);
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
      transform: translateZ(40px);
      animation: floatNavbar 6s infinite ease-in-out;
    }

    @keyframes floatNavbar {
      0%,100% { transform: translateZ(40px) translateY(0); }
      50% { transform: translateZ(60px) translateY(-5px); }
    }

    .navbar h2 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: 1px;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 25px;
      margin: 0;
      padding: 0;
    }

    .navbar ul li a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 6px;
      transition: all 0.3s ease;
      display: inline-block;
      transform-style: preserve-3d;
    }

    .navbar ul li a:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px) rotateX(10deg);
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }

    /* 📦 Contact Form */
    .container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      max-width: 520px;
      width: 90%;
      margin: 60px auto;
      box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.4),
                  -10px -10px 30px rgba(255, 255, 255, 0.2);
      text-align: center;
      transform-style: preserve-3d;
      transform: rotateX(3deg) rotateY(-3deg);
      transition: transform 0.6s ease, box-shadow 0.6s ease;
    }

    .container:hover {
      transform: rotateX(0deg) rotateY(0deg) scale(1.03);
      box-shadow: 25px 25px 60px rgba(0,0,0,0.5),
                  -15px -15px 40px rgba(255,255,255,0.3);
    }

    .container h1 {
      font-size: 2rem;
      color: #2575fc;
      margin-bottom: 10px;
      transform: translateZ(30px);
    }

    .container p {
      color: #555;
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #333;
      text-align: left;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      background: #f5f5f5;
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2),
                  inset -4px -4px 8px rgba(255,255,255,0.7);
      transition: all 0.3s ease;
      transform: translateZ(15px);
    }

    input:focus, textarea:focus {
      outline: none;
      background: #fff;
      transform: scale(1.03) translateZ(25px);
      box-shadow: 6px 6px 12px rgba(0,0,0,0.3),
                  -6px -6px 12px rgba(255,255,255,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(145deg, #2575fc, #6a11cb);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(20px);
      box-shadow: 6px 6px 14px rgba(0,0,0,0.4),
                  -4px -4px 12px rgba(255,255,255,0.2);
    }

    button:hover {
      background: linear-gradient(145deg, #6a11cb, #2575fc);
      transform: translateY(-3px) scale(1.05) translateZ(25px);
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.4),
                  inset -4px -4px 8px rgba(255,255,255,0.3);
    }

    /* ⚡ Footer */
    .footer {
      background: linear-gradient(145deg, #1f5ad7, #5a0eb5);
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: auto;
      box-shadow: 0 -6px 12px rgba(0, 0, 0, 0.3);
      transform: translateZ(30px);
      animation: floatFooter 6s infinite ease-in-out alternate;
    }

    @keyframes floatFooter {
      0%,100% { transform: translateZ(30px) translateY(0); }
      50% { transform: translateZ(50px) translateY(5px); }
    }

    .footer p {
      margin: 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <h2>Lost & Found</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- Contact Form -->
  <div class="container">
    <h1><i class="fas fa-envelope"></i> Contact Us</h1>
    <p>Feel free to reach out to us for any queries or support.</p>
    <form action="https://formspree.io/f/mayvlrpg" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4" required></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 Lost & Found Portal | All Rights Reserved</p>
  </footer>
</body>
</html>
